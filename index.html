<style>
    /* ランキング用UI */
    #ranking-board {
        display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.9); border: 2px solid var(--neon-blue); padding: 20px;
        border-radius: 15px; width: 250px; text-align: center; z-index: 500;
    }
    .rank-item { display: flex; justify-content: space-between; font-size: 14px; margin: 5px 0; color: #fff; }
    #name-input { width: 80%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid var(--neon-blue); color: #fff; text-align: center; }
</style>

<div id="ranking-board">
    <h2 style="color:var(--neon-blue); font-size: 18px;">HALL OF FAME</h2>
    <div id="rank-list"></div>
    <hr style="border:0.5px solid #333;">
    <input type="text" id="name-input" placeholder="ENTER NAME" maxlength="10">
    <button class="menu-btn" onclick="submitScore()" style="font-size:12px; padding:10px;">SUBMIT & RETRY</button>
</div>

<script>
    let currentScore = 0;
    const SERVER_URL = 'https://your-api-server.com'; // 社長のサーバーURL

    // ゲームオーバー時に呼び出す
    function gameOver() {
        isGameOver = true;
        document.getElementById('ranking-board').style.display = 'block';
        loadRanking(); // 現在のランキングを表示
    }

    // ランキングを取得して表示
    async function loadRanking() {
        try {
            const res = await fetch(`${SERVER_URL}/api/ranking`);
            const data = await res.json();
            const list = document.getElementById('rank-list');
            list.innerHTML = data.map((s, i) => `
                <div class="rank-item">
                    <span>${i+1}. ${s.name}</span>
                    <span>${s.score}pt</span>
                </div>
            `).join('');
        } catch (e) { console.error("Ranking load failed"); }
    }

    // スコアを送信
    async function submitScore() {
        const name = document.getElementById('name-input').value || "ANON";
        try {
            await fetch(`${SERVER_URL}/api/save-score`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: name, score: currentScore })
            });
            location.reload(); // 送信後リロード
        } catch (e) { alert("Submit failed"); }
    }
</script>
