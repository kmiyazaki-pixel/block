<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BREAKOUT RANKING BATTLE</title>
  <style>
    :root { --neon-blue: #00d2ff; --neon-pink: #ff007f; --neon-green: #0f0; --glass: rgba(255, 255, 255, 0.05); }
    body { background: #05050a; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; overflow: hidden; touch-action: none; }

    .header { margin-top: 18px; text-align: center; position: relative; width: 100%; max-width: 380px; }
    .score-display { font-size: 24px; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

    #game-container { display: flex; flex-direction: column; align-items: center; width: 100%; flex-grow: 1; justify-content: center; position: relative; }
    canvas { background: #000; border: 3px solid var(--neon-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); border-radius: 8px; }

    .controls { width: 100%; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: auto; padding-bottom: 16px; }
    .touch-area { width: 90%; height: 64px; background: var(--glass); border: 2px dashed rgba(255,255,255,0.2); border-radius: 35px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px; letter-spacing: 2px; }

    .menu-btn { width: 100%; padding: 14px; background: transparent; color: var(--neon-green); border: 2px solid var(--neon-green); border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.25s; }
    .menu-btn:hover { background: var(--neon-green); color: #000; }

    .panel {
      display: none; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(5, 5, 20, 0.95); border: 2px solid rgba(255,255,255,0.12);
      padding: 22px; border-radius: 18px; width: 290px; text-align: center; z-index: 1000; backdrop-filter: blur(10px);
    }
    .panel h2 { margin: 0 0 12px; font-size: 18px; letter-spacing: 1px; }
    .sub { font-size: 12px; color: rgba(255,255,255,0.65); margin: 6px 0 14px; }

    #start-panel { display: block; border-color: rgba(0,210,255,0.35); }

    #ranking-panel { border-color: rgba(255,0,127,0.55); }
    #rank-list{ max-height: 220px; overflow: auto; padding-right: 6px; text-align:left; }
    .rank-item { display: flex; justify-content: space-between; font-size: 14px; margin: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 4px; }
    #name-input { width: 90%; padding: 12px; margin: 14px 0 10px; background: #111; border: 1px solid var(--neon-blue); color: #fff; text-align: center; font-family: inherit; border-radius: 10px; }

    .toast {
      position:absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 12px; border-radius: 999px; font-size: 12px; color:#fff; z-index: 1200; display:none;
    }

    /* Pause button */
    #pause-btn{
      position: absolute;
      top: 8px;
      right: 10px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
      color: #fff;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 1px;
      display: none; /* ゲーム中だけ表示 */
      user-select: none;
    }
    #pause-btn:hover{
      border-color: rgba(0,210,255,0.6);
      box-shadow: 0 0 10px rgba(0,210,255,0.25);
    }

    /* Pause overlay */
    #pause-panel{
      display:none;
      border-color: rgba(255,255,255,0.18);
    }
    #pause-panel .menu-btn{ margin-top: 10px; }

    /* Tutorial (one-time) */
    #tutorial-panel{
      display:none;
      border-color: rgba(255,255,255,0.2);
    }
    .tip{
      text-align:left;
      font-size: 12px;
      color: rgba(255,255,255,0.78);
      line-height: 1.5;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px;
      margin: 10px 0 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="score-display">SCORE: <span id="score">0</span></div>
    <div id="pause-btn">⏸</div>
  </div>

  <div id="game-container">
    <canvas id="gameCanvas" width="300" height="400"></canvas>

    <!-- START -->
    <div id="start-panel" class="panel">
      <h2 style="color:var(--neon-blue);">BREAKOUT</h2>
      <div class="sub">Tap START to play</div>
      <button class="menu-btn" id="start-btn">START</button>
      <div class="sub" style="margin-top:12px;">LIFE: 2 / Ball: 20 → 10</div>
    </div>

    <!-- Tutorial (one-time) -->
    <div id="tutorial-panel" class="panel">
      <h2 style="color:#fff;">HOW TO PLAY</h2>
      <div class="tip">
        ・下のエリアをドラッグしてパドル移動<br>
        ・ブロック連続破壊でCOMBO（スコアUP）<br>
        ・FEVERでスコア2倍（一定数壊すと発動）<br>
        ・落ちてくる W/M/P はパワーアップ
      </div>
      <button class="menu-btn" id="tutorial-ok-btn">OK</button>
    </div>

    <!-- Pause -->
    <div id="pause-panel" class="panel">
      <h2 style="color:#fff;">PAUSED</h2>
      <div class="sub">Tap resume to continue</div>
      <button class="menu-btn" id="resume-btn">RESUME</button>
      <button class="menu-btn" id="restart-btn">RESTART</button>
    </div>

    <!-- Game Over + Ranking -->
    <div id="ranking-panel" class="panel">
      <h2 style="color:var(--neon-pink);">GAME OVER</h2>
      <div class="sub">Your score: <span id="final-score">0</span></div>

      <div id="rank-list"></div>

      <input type="text" id="name-input" placeholder="YOUR NAME" maxlength="10">
      <button class="menu-btn" id="submit-btn">SUBMIT & REPLAY</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <div class="controls">
    <div class="touch-area" id="touch-control">DRAG TO MOVE</div>
  </div>

  <script>
    const SERVER_URL = 'https://block-r057.onrender.com';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const scoreEl = document.getElementById('score');
    const toastEl = document.getElementById('toast');

    const pauseBtn = document.getElementById('pause-btn');

    const startPanel = document.getElementById('start-panel');
    const startBtn = document.getElementById('start-btn');

    const tutorialPanel = document.getElementById('tutorial-panel');
    const tutorialOkBtn = document.getElementById('tutorial-ok-btn');

    const pausePanel = document.getElementById('pause-panel');
    const resumeBtn = document.getElementById('resume-btn');
    const restartBtn = document.getElementById('restart-btn');

    const rankingPanel = document.getElementById('ranking-panel');
    const finalScoreEl = document.getElementById('final-score');
    const rankList = document.getElementById('rank-list');
    const nameInput = document.getElementById('name-input');
    const submitBtn = document.getElementById('submit-btn');

    const touchArea = document.getElementById('touch-control');

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.style.display = 'block';
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.style.display = 'none', 1200);
    }

    // ===== ゲーム状態 =====
    let running = false;
    let isGameOver = false;
    let isPaused = false;

    // LIFE=2
    let lives = 2;

    // Score / Combo / Fever
    let score = 0;
    let combo = 0;
    let comboMul = 1.0;

    let fever = 0;
    let feverActive = false;
    let feverEndAt = 0;
    const FEVER_DURATION_MS = 8000;
    const FEVER_MULT = 2.0;

    // Paddle
    const paddleBaseW = 60;
    const paddle = { x: (canvas.width - paddleBaseW)/2, y: canvas.height - 25, w: paddleBaseW, h: 10, color: '#00d2ff' };

    // Ball size: 20 -> half (10) minimum
    const baseBallSpeed = 3.2;
    const BALL_R_MAX = 20;
    const BALL_R_MIN = 10;          // ★ half size minimum
    const BALL_SHRINK_PER_SCORE = 250;

    function calcBallRadius() {
      const shrink = Math.floor(score / BALL_SHRINK_PER_SCORE);
      return Math.max(BALL_R_MIN, BALL_R_MAX - shrink);
    }

    function makeBall(x, y, dx, dy) {
      return { x, y, dx, dy, r: BALL_R_MAX, pierceUntil: 0 };
    }

    let balls = [];

    function syncBallRadius() {
      const r = calcBallRadius();
      balls.forEach(b => b.r = r);
    }

    function resetToSingleBall() {
      balls = [ makeBall(canvas.width/2, canvas.height*0.55, baseBallSpeed, -baseBallSpeed) ];
      syncBallRadius();
    }

    // Blocks (8x6)
    const blockRowCount = 6;
    const blockColumnCount = 8;
    const blockHeight = 16;
    const blockPadding = 4;
    const blockOffsetTop = 44;
    const blockOffsetLeft = 10;
    const blockWidth = Math.floor((canvas.width - blockOffsetLeft*2 - blockPadding*(blockColumnCount-1)) / blockColumnCount);

    let blocks = [];
    function initBlocks() {
      blocks = [];
      for(let c=0; c<blockColumnCount; c++) {
        blocks[c] = [];
        for(let r=0; r<blockRowCount; r++) blocks[c][r] = { x: 0, y: 0, status: 1 };
      }
    }
    initBlocks();

    function resetBlocks() {
      for(let c=0; c<blockColumnCount; c++) for(let r=0; r<blockRowCount; r++) blocks[c][r].status = 1;
    }

    function isAllCleared() {
      for (let c=0; c<blockColumnCount; c++) for (let r=0; r<blockRowCount; r++) if (blocks[c][r].status === 1) return false;
      return true;
    }

    // Powerups: WIDE / MULTI / PIERCE
    const powerups = [];
    const POWER_CHANCE = 0.18;
    const POWER_VY = 2.2;

    const PowerType = { WIDE:'WIDE', MULTI:'MULTI', PIERCE:'PIERCE' };

    function maybeDropPowerup(x, y) {
      if (Math.random() > POWER_CHANCE) return;
      const roll = Math.random();
      let type = PowerType.WIDE;
      if (roll < 0.50) type = PowerType.WIDE;
      else if (roll < 0.80) type = PowerType.MULTI;
      else type = PowerType.PIERCE;
      powerups.push({ x, y, vy: POWER_VY, type });
    }

    let wideTimer = null;
    const WIDE_MS = 8000;
    const PIERCE_MS = 6000;

    function applyPower(type) {
      const now = performance.now();

      if (type === PowerType.WIDE) {
        clearTimeout(wideTimer);
        paddle.w = Math.min(paddleBaseW * 1.8, 110);
        toast('POWER: WIDE');
        wideTimer = setTimeout(() => { paddle.w = paddleBaseW; clampPaddle(); }, WIDE_MS);
      }

      if (type === PowerType.MULTI) {
        toast('POWER: MULTI');
        const b = balls[0] || makeBall(canvas.width/2, canvas.height/2, baseBallSpeed, -baseBallSpeed);
        balls.push(makeBall(b.x, b.y, -b.dx, b.dy));
        balls.push(makeBall(b.x, b.y, b.dx * 0.8, -b.dy * 0.8));
        syncBallRadius();
      }

      if (type === PowerType.PIERCE) {
        toast('POWER: PIERCE');
        balls.forEach(bb => bb.pierceUntil = Math.max(bb.pierceUntil, now + PIERCE_MS));
      }
    }

    // ===== スコア/フィーバー =====
    function addScore(base) {
      comboMul = Math.min(1 + combo * 0.08, 2.5);
      const feverMul = feverActive ? FEVER_MULT : 1.0;
      const add = Math.floor(base * comboMul * feverMul);

      score += add;
      scoreEl.innerText = score;

      syncBallRadius();
    }

    function addFever(amount) {
      if (feverActive) return;
      fever = Math.min(100, fever + amount);
      if (fever >= 100) startFever();
    }

    function startFever() {
      feverActive = true;
      fever = 0;
      feverEndAt = performance.now() + FEVER_DURATION_MS;
      toast('FEVER x2!');
    }

    function updateFever() {
      if (!feverActive) return;
      if (performance.now() >= feverEndAt) {
        feverActive = false;
        toast('FEVER END');
      }
    }

    // ===== 描画 =====
    function drawPaddle() {
      ctx.fillStyle = paddle.color;
      ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
    }

    function drawBall(b) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
      const pierceOn = performance.now() < b.pierceUntil;
      ctx.fillStyle = pierceOn ? "#ff66aa" : "#fff";
      ctx.fill();
      ctx.closePath();
    }

    function drawBlocks() {
      for(let c=0; c<blockColumnCount; c++) {
        for(let r=0; r<blockRowCount; r++) {
          if(blocks[c][r].status === 1) {
            const bx = (c * (blockWidth + blockPadding)) + blockOffsetLeft;
            const by = (r * (blockHeight + blockPadding)) + blockOffsetTop;
            blocks[c][r].x = bx;
            blocks[c][r].y = by;
            ctx.fillStyle = `hsl(${r * 35}, 70%, 50%)`;
            ctx.fillRect(bx, by, blockWidth, blockHeight);
          }
        }
      }
    }

    function drawPowerups() {
      powerups.forEach(p => {
        ctx.save();
        ctx.beginPath();
        ctx.arc(p.x, p.y, 9, 0, Math.PI*2);
        ctx.fillStyle = "rgba(255,255,255,0.12)";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.25)";
        ctx.stroke();
        ctx.fillStyle = "#fff";
        ctx.font = "10px Arial Black";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(p.type === 'WIDE' ? 'W' : p.type === 'MULTI' ? 'M' : 'P', p.x, p.y + 0.5);
        ctx.restore();
      });
    }

    // ===== 衝突 =====
    function collisionDetectionForBall(b) {
      const pierceOn = performance.now() < b.pierceUntil;

      for(let c=0; c<blockColumnCount; c++) {
        for(let r=0; r<blockRowCount; r++) {
          const blk = blocks[c][r];
          if(blk.status === 1) {
            if(b.x > blk.x && b.x < blk.x + blockWidth && b.y > blk.y && b.y < blk.y + blockHeight) {
              blk.status = 0;
              if (!pierceOn) b.dy = -b.dy;

              combo += 1;
              addFever(7);
              addScore(10);

              maybeDropPowerup(blk.x + blockWidth/2, blk.y + blockHeight/2);

              if (isAllCleared()) {
                resetBlocks();
                toast('NEXT WAVE!');
              }
            }
          }
        }
      }
    }

    function updatePowerups() {
      for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.vy;

        const hit = (p.y >= paddle.y - 10 && p.y <= paddle.y + paddle.h + 10 &&
                     p.x >= paddle.x && p.x <= paddle.x + paddle.w);
        if (hit) {
          applyPower(p.type);
          powerups.splice(i, 1);
          continue;
        }
        if (p.y > canvas.height + 20) powerups.splice(i, 1);
      }
    }

    function clampPaddle() {
      if (paddle.x < 0) paddle.x = 0;
      if (paddle.x > canvas.width - paddle.w) paddle.x = canvas.width - paddle.w;
    }

    function loseLife() {
      lives -= 1;
      resetToSingleBall();
      paddle.x = (canvas.width - paddle.w) / 2;
      clampPaddle();

      combo = 0;
      comboMul = 1.0;

      toast(`MISS! LIFE ${lives}`);

      if (lives <= 0) endGame();
    }

    function updateBalls() {
      updateFever();

      for (let i = balls.length - 1; i >= 0; i--) {
        const b = balls[i];

        if (b.x + b.dx > canvas.width - b.r || b.x + b.dx < b.r) b.dx = -b.dx;
        if (b.y + b.dy < b.r) b.dy = -b.dy;

        if (b.y + b.dy > paddle.y - b.r) {
          if (b.x > paddle.x && b.x < paddle.x + paddle.w) {
            b.dy = -Math.abs(b.dy);
            const hitPos = (b.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
            b.dx = hitPos * 4;

            // パドルでコンボリセット
            combo = 0;
            comboMul = 1.0;
          } else if (b.y > canvas.height) {
            balls.splice(i, 1);
            continue;
          }
        }

        b.x += b.dx;
        b.y += b.dy;

        collisionDetectionForBall(b);
      }

      if (balls.length === 0 && !isGameOver) loseLife();
    }

    function loop() {
      if (!running || isPaused || isGameOver) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (feverActive) {
        ctx.save();
        ctx.fillStyle = "rgba(255,0,127,0.03)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      drawBlocks();
      drawPowerups();
      balls.forEach(drawBall);
      drawPaddle();

      updatePowerups();
      updateBalls();

      requestAnimationFrame(loop);
    }

    // ===== 画面遷移 =====
    function showPanel(panelEl) {
      startPanel.style.display = 'none';
      tutorialPanel.style.display = 'none';
      pausePanel.style.display = 'none';
      rankingPanel.style.display = 'none';
      if (panelEl) panelEl.style.display = 'block';
    }

    function startGame() {
      // 初期化
      score = 0;
      lives = 2;
      combo = 0;
      comboMul = 1.0;
      fever = 0;
      feverActive = false;
      powerups.length = 0;
      initBlocks();

      paddle.w = paddleBaseW;
      paddle.x = (canvas.width - paddle.w)/2;

      resetToSingleBall();
      scoreEl.innerText = '0';

      isGameOver = false;
      isPaused = false;
      running = true;

      pauseBtn.style.display = 'block';
      pauseBtn.textContent = '⏸';

      requestAnimationFrame(loop);
    }

    async function endGame() {
      running = false;
      isGameOver = true;
      pauseBtn.style.display = 'none';

      finalScoreEl.innerText = String(score);
      showPanel(rankingPanel);

      // 前回名前復元
      const savedName = localStorage.getItem('playerName');
      if (savedName) nameInput.value = savedName;

      // ランキング取得
      try {
        const res = await fetch(`${SERVER_URL}/api/ranking?limit=100`);
        const data = await res.json();
        rankList.innerHTML = '';
        data.forEach((s, i) => {
          const row = document.createElement('div');
          row.className = 'rank-item';
          const left = document.createElement('span');
          left.textContent = `${i + 1}. ${s.name}`;
          const right = document.createElement('span');
          right.textContent = String(s.score);
          row.append(left, right);
          rankList.appendChild(row);
        });
      } catch (e) {
        rankList.textContent = 'RANKING OFFLINE';
      }
    }

    // ===== Pause =====
    function pauseGame() {
      if (!running || isGameOver) return;
      isPaused = true;
      pauseBtn.textContent = '▶';
      showPanel(pausePanel);
    }

    function resumeGame() {
      if (!running || isGameOver) return;
      isPaused = false;
      pauseBtn.textContent = '⏸';
      showPanel(null);
      requestAnimationFrame(loop);
    }

    function restartFromPause() {
      // START画面に戻す（やり直し）
      running = false;
      isPaused = false;
      isGameOver = false;
      pauseBtn.style.display = 'none';
      showPanel(startPanel);
    }

    pauseBtn.addEventListener('click', () => {
      if (!running || isGameOver) return;
      if (isPaused) resumeGame();
      else pauseGame();
    });

    resumeBtn.addEventListener('click', resumeGame);
    restartBtn.addEventListener('click', restartFromPause);

    // ===== Tutorial (one-time) =====
    function shouldShowTutorial() {
      return localStorage.getItem('tutorialSeen') !== '1';
    }

    function markTutorialSeen() {
      localStorage.setItem('tutorialSeen', '1');
    }

    function onStartPressed() {
      // 初回だけチュートリアル
      if (shouldShowTutorial()) {
        showPanel(tutorialPanel);
      } else {
        showPanel(null);
        startGame();
      }
    }

    tutorialOkBtn.addEventListener('click', () => {
      markTutorialSeen();
      showPanel(null);
      startGame();
    });

    // ===== Submit =====
    async function submitScore() {
      const name = (nameInput.value || 'PLAYER').trim().slice(0, 10) || 'PLAYER';
      localStorage.setItem('playerName', name);

      try {
        await fetch(`${SERVER_URL}/api/save-score`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, score })
        });
      } catch (e) {}

      // リプレイへ
      showPanel(startPanel);
    }

    // ===== 操作 =====
    function movePaddleByClientX(clientX) {
      const rect = touchArea.getBoundingClientRect();
      const x = clientX - rect.left;
      const ratio = x / rect.width;
      paddle.x = ratio * canvas.width - paddle.w/2;
      clampPaddle();
    }

    touchArea.addEventListener('touchmove', (e) => {
      e.preventDefault();
      movePaddleByClientX(e.touches[0].clientX);
    }, { passive: false });

    touchArea.addEventListener('mousemove', (e) => {
      movePaddleByClientX(e.clientX);
    });

    // ===== Bind buttons =====
    startBtn.addEventListener('click', onStartPressed);
    submitBtn.addEventListener('click', submitScore);

    // 初期：STARTだけ
    showPanel(startPanel);
  </script>
</body>
</html>
